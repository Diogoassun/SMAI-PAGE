<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Fundo de Vento</title>
</head>
<body>
    <div class="background-wind">
        </div>

    <div class="content">
        <h1>Seu Conteúdo Aqui</h1>
        <p>Este conteúdo fica sobre o fundo animado.</p>
    </div>

    <div class="leaves-container"></div>

    <style>
        /* Animação de Vento com Folhas Caindo */

        .leaves-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            z-index: -1;
        }

        .leaf {
            position: absolute;
            top: -50px; /* Começa fora da tela */
            width: 20px;
            height: 15px;
            background-color: #4caf50; /* Cor de folha */
            border-radius: 5px 50%;
            opacity: 0.7;
            animation: fall 15s linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(105vh) translateX(50px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Usando JavaScript para gerar as folhas é a melhor abordagem */
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.querySelector('.leaves-container');
            const leafCount = 30;

            for (let i = 0; i < leafCount; i++) {
                const leaf = document.createElement('div');
                leaf.classList.add('leaf');
                
                leaf.style.left = `${Math.random() * 100}%`;
                leaf.style.animationDelay = `${Math.random() * 15}s`;
                leaf.style.animationDuration = `${10 + Math.random() * 10}s`;
                leaf.style.opacity = Math.random();
                leaf.style.transform = `scale(${0.5 + Math.random()})`;
                
                container.appendChild(leaf);
            }
        });
    </script>
</body>
</html>
