<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poeira no Ar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="dust-canvas"></canvas>
    <div class="content">
        <h1>Poeira Suspensa</h1>
        <p>Observe as partículas flutuando e interaja com o mouse.</p>
    </div>
    <style>
        /* style.css (exatamente o mesmo de antes) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #101018; color: white; font-family: sans-serif; }
        #dust-canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .content { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; text-align: center; }
    </style>
    
    <script>
        // script.js

        const canvas = document.getElementById('dust-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- Configurações da Simulação de Poeira ---
        const PARTICLE_COUNT = 300;    // Mais partículas para um efeito de poeira denso
        const MOUSE_RADIUS = 120;       // Raio de influência do mouse
        const REPEL_STRENGTH = 1;       // Força de desvio (mais sutil agora)

        // --- Configurações de Profundidade (Eixo Z) ---
        const MAX_DEPTH = 100;           // Profundidade máxima do nosso "espaço 3D"
        const MIN_SIZE = 0.1;           // Tamanho da partícula mais distante
        const MAX_SIZE = 2.5;           // Tamanho da partícula mais próxima
        const MIN_SPEED = 0.001;          // Velocidade da partícula mais distante
        const MAX_SPEED = 0.5;          // Velocidade da partícula mais próxima
        const MIN_OPACITY = 0.01;        // Opacidade da partícula mais distante
        const MAX_OPACITY = 0.5;        // Opacidade da partícula mais próxima

        const mouse = { x: null, y: null };

        window.addEventListener('mousemove', e => { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });

        // Função auxiliar para mapear um valor de um intervalo para outro (essencial para a profundidade)
        function mapRange(value, inMin, inMax, outMin, outMax) {
            return (value - inMin) * (outMax - outMin) / (inMax - inMin) + outMin;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.z = Math.random() * MAX_DEPTH; // Posição na profundidade

                // Mapeia o 'z' para as propriedades visuais
                this.size = mapRange(this.z, 0, MAX_DEPTH, MAX_SIZE, MIN_SIZE);
                this.speed = mapRange(this.z, 0, MAX_DEPTH, MAX_SPEED, MIN_SPEED);
                this.opacity = mapRange(this.z, 0, MAX_DEPTH, MAX_OPACITY, MIN_OPACITY);
                
                // Ângulo de movimento inicial aleatório para flutuação
                this.angle = Math.random() * Math.PI * 2;
            }

            update() {
                // Altera levemente o ângulo para criar um caminho errante
                this.angle += (Math.random() - 0.5) * 0.05;

                // Movimento de flutuação
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                // Interação com o mouse (mesma lógica, mas aplicada ao movimento de flutuação)
                if (mouse.x !== null) {
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < MOUSE_RADIUS + this.size) {
                        const force = (MOUSE_RADIUS - distance) / MOUSE_RADIUS;
                        const repelAngle = Math.atan2(dy, dx);
                        this.x += Math.cos(repelAngle) * force * REPEL_STRENGTH;
                        this.y += Math.sin(repelAngle) * force * REPEL_STRENGTH;
                    }
                }
                
                // Verifica se a partícula saiu de qualquer um dos 4 cantos e a faz "dar a volta"
                if (this.x < -this.size) this.x = canvas.width + this.size;
                if (this.x > canvas.width + this.size) this.x = -this.size;
                if (this.y < -this.size) this.y = canvas.height + this.size;
                if (this.y > canvas.height + this.size) this.y = -this.size;
            }

            draw() {
                ctx.fillStyle = `rgba(255, 240, 200, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        let particles = [];
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Recria as partículas para se adaptarem ao novo tamanho da tela
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }
        });
    </script>
</body>
</html>
