<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Fundo de Vento</title>
</head>
<body>
    <div class="background-wind">
        </div>

    <div class="content">
        <h1>Seu Conteúdo Aqui</h1>
        <p>Este conteúdo fica sobre o fundo animado.</p>
    </div>

    <div class="particles-container"></div>

    <style>
        /* Animação de Vento com Partículas Flutuantes */

        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Fica atrás de todo o conteúdo */
        }

        /* Vamos gerar as partículas usando SASS/SCSS ou manualmente */
        /* Para este exemplo, faremos manualmente para ser mais simples */
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        /* Precisamos criar várias partículas com posições e atrasos diferentes */
        /* Este processo pode ser automatizado com JavaScript ou um pré-processador CSS */
        /* Exemplo manual: */
        .particle:nth-child(1) { top: 10%; left: 20%; animation-delay: -2s; animation-duration: 25s; }
        .particle:nth-child(2) { top: 30%; left: 80%; animation-delay: -4s; animation-duration: 18s; }
        .particle:nth-child(3) { top: 70%; left: 50%; animation-delay: -1s; animation-duration: 22s; }
        /* ...adicione quantas partículas quiser */

        @keyframes float {
            0% {
                transform: translateX(0) translateY(0);
                opacity: 0.7;
            }
            50% {
                transform: translateX(80px) translateY(-40px);
                opacity: 0.3;
            }
            100% {
                transform: translateX(-20px) translateY(-80px) scale(0.5);
                opacity: 0;
            }
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
        const container = document.querySelector('.particles-container');
        const particleCount = 50; // Quantidade de partículas

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            particle.style.top = `${Math.random() * 100}%`;
            particle.style.left = `${Math.random() * 100}%`;
            particle.style.animationDelay = `${Math.random() * -20}s`;
            particle.style.animationDuration = `${15 + Math.random() * 10}s`;
            
            container.appendChild(particle);
        }
    });
    </script>
</body>
</html>
