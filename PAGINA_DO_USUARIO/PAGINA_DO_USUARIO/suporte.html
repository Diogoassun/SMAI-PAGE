<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<!-- Boxicons -->
	<link href='https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css' rel='stylesheet'>
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
	<!-- My CSS -->
	<link rel="stylesheet" href="style_suporte.css">

	<title>SMAI</title>
</head>
<body>


	<!-- SIDEBAR -->
	<section id="sidebar">
		<a href="#" class="brand">
			<i class="fa-solid fa-snowflake"></i>
			<span class="text">SMAI</span>
		</a>
		<ul class="side-menu top">
			<li>
				<a href="./presentation.html">
					<i class='bx bxs-dashboard' ></i>
					<span class="text">Dashboard</span>
				</a>
			</li>
			<li>
				<a href="#">
					<i class='bx bxs-shopping-bag-alt' ></i>
					<span class="text">My Store</span>
				</a>
			</li>
			<li>
				<a href="./Analytics.html">
					<i class='bx bxs-doughnut-chart' ></i>
					<span class="text">Analytics</span>
				</a>
			</li>
			<li>
				<a href="#">
					<i class='bx bxs-message-dots' ></i>
					<span class="text">Message</span>
				</a>
			</li>
			<li class="active">
				<a href="./suporte.html">
					<i class='bx bxs-group' ></i>
					<span class="text">Suporte</span>
				</a>
			</li>
		</ul>
		<ul class="side-menu">
			<li>
				<a href="./Settings.html">
					<i class='bx bxs-cog' ></i>
					<span class="text">Settings</span>
				</a>
			</li>
			<li>
				<a href="#" class="logout">
					<i class='bx bxs-log-out-circle' ></i>
					<span class="text">Logout</span>
				</a>
			</li>
		</ul>
	</section>
	<!-- SIDEBAR -->



	<!-- CONTENT -->
	<section id="content">
		<!-- NAVBAR -->
		<nav>
			<i class='bx bx-menu' ></i>
			<a href="#" class="nav-link">Categories</a>
			<form action="#">
				<div class="form-input">
					<input type="search" placeholder="Search...">
					<button type="submit" class="search-btn"><i class='bx bx-search' ></i></button>
				</div>
			</form>
			<input type="checkbox" id="switch-mode" hidden>
			<label for="switch-mode" class="switch-mode"></label>
			<a href="#" class="notification">
				<i class='bx bxs-bell' ></i>
				<span class="num">8</span>
			</a>
			<a href="#" class="profile">
				<img src="img/people.png">
			</a>
		</nav>
		<!-- NAVBAR -->

		<!-- MAIN -->
		<main>
			<div class="head-title">
				<div class="left">
					<h1>Suporte</h1>
					<ul class="breadcrumb">
						<li>
							<a href="#">Suporte</a>
						</li>
						<li><i class='bx bx-chevron-right' ></i></li>
						<li>
							<a class="active" href="#">Home</a>
						</li>
					</ul>
				</div>
			</div>


			<div class="table-data">
                <div class="order">
                    <div class="head">
                    <h3>Envie um E-mail para o Suporte</h3>
                    <i class='bx bx-envelope'></i>
                    </div>

                    <!-- Formulário usando Formspree -->
                    <form action="https://formspree.io/f/xzzgnwae" method="POST">
                    <div style="display: flex; flex-direction: column; gap: 16px;">

                        <label for="name">Seu Nome:</label>
                        <input
                        type="text"
                        id="name"
                        name="name"
                        placeholder="Digite seu nome..."
                        required
                        style="padding: 10px; border-radius: 8px; border: 1px solid #ccc;"
                        >

                        <label for="email">Seu E-mail:</label>
                        <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Digite seu e-mail..."
                        required
                        style="padding: 10px; border-radius: 8px; border: 1px solid #ccc;"
                        >

                        <label for="subject">Assunto:</label>
                        <input
                        type="text"
                        id="subject"
                        name="subject"
                        placeholder="Digite o assunto..."
                        required
                        style="padding: 10px; border-radius: 8px; border: 1px solid #ccc;"
                        >

                        <label for="message">Mensagem:</label>
                        <textarea
                        id="message"
                        name="message"
                        rows="6"
                        placeholder="Descreva seu problema aqui..."
                        required
                        style="padding: 10px; border-radius: 8px; border: 1px solid #ccc;"
                        ></textarea>


                        <!-- Desativa o CAPTCHA -->
                        <input type="hidden" name="_captcha" value="false">

                        <button
                        type="submit"
                        style="padding: 10px 20px; background-color: var(--blue); color: white; border: none; border-radius: 8px; cursor: pointer;"
                        >
                        Enviar E-mail
                        </button>
                    </div>
                    </form>
                </div>

                <div class="todo">
                    <img
                    src="/PAGINA_DO_USUARIO/Imagens/Contact us.gif"
                    alt="Ilustração de Suporte"
                    style="width: 100%; height: auto;"
                    >
                </div>
                </div>


		</main>
		<!-- MAIN -->
	</section>
	<!-- CONTENT -->
	

	<script src="script.js"></script>



</body>
</html>
